# BF-15 Bug-Finding Suite
# Each task presents a buggy Python function. The model must identify and fix the bug.
# Bug types: off-by-one, logic inversion, missing edge case, type confusion,
#   index out of bounds, wrong operator, missing return, float precision,
#   infinite loop, wrong sort, regex boundary, uninitialized var, wrong default,
#   encoding issue, race condition.

tasks:
- id: BF-001
  title: Off-by-one error in range summation
  messages:
    - role: user
      content: |
        Analyze the following Python function. It is supposed to return the sum of all
        integers from start to end inclusive, but it contains exactly one bug.

        Find the bug and fix it. Return ONLY the corrected function body (the for loop).

        ```python
        def sum_range(start: int, end: int) -> int:
            total = 0
            for i in range(start, end):  # BUG: misses the end value
                total += i
            return total
        ```

  max_tokens: 512
  difficulty: easy
  capability_tags: [code-debugging, algorithm]
  verifier_type: exact_match
  metadata:
    bug_type: off-by-one-error
    fix_line: "range(start, end + 1)"

